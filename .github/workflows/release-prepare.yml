name: Release Prepare

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'tools/scripts/release.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'nx.json'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump/specifier to prepare'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease
      preid:
        description: 'Optional prerelease identifier, e.g. beta'
        required: false
        type: string
      dry_run:
        description: 'Run the release preparation without opening a PR'
        required: true
        default: true
        type: boolean

concurrency:
  group: caliobase-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare release PR
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'push' ||
      !contains(github.event.head_commit.message, 'chore(release):')
    permissions:
      contents: write
      pull-requests: write
      actions: write
    env:
      CI: true
      GH_TOKEN: ${{ github.token }}
      RELEASE_VERSION: ${{ inputs.version || 'patch' }}
      RELEASE_PREID: ${{ inputs.preid || '' }}
      RELEASE_DRY_RUN: ${{ inputs.dry_run || 'false' }}
      RELEASE_SKIP_EMPTY: ${{ github.event_name == 'push' && 'true' || 'false' }}

    steps:
      - name: Require main branch
        if: github.ref != 'refs/heads/main'
        run: |
          echo "Releases must be prepared from main. Current ref: $GITHUB_REF" >&2
          exit 1

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for existing release PR
        id: existing_release
        if: env.RELEASE_DRY_RUN != 'true'
        run: |
          existing_prs=$(gh pr list \
            --base main \
            --state open \
            --json number,title,headRefName,url \
            --jq '[.[] | select(.headRefName | startswith("release/"))]')
          count=$(jq 'length' <<<"$existing_prs")
          echo "count=$count" >> "$GITHUB_OUTPUT"
          if [[ "$count" != "0" ]]; then
            echo "Found existing release PR(s); skipping duplicate release generation."
            jq -r '.[] | "- #\(.number) \(.title): \(.url)"' <<<"$existing_prs"
          fi

      - name: Create release branch
        if: env.RELEASE_DRY_RUN != 'true' && steps.existing_release.outputs.count == '0'
        run: |
          branch="release/${RELEASE_VERSION}-${GITHUB_RUN_ID}"
          git switch -c "$branch"
          echo "RELEASE_BRANCH=$branch" >> "$GITHUB_ENV"

      - name: Setup Docker Compose
        if: env.RELEASE_DRY_RUN == 'true' || steps.existing_release.outputs.count == '0'
        uses: docker/setup-compose-action@v1

      - name: Setup Node.js
        if: env.RELEASE_DRY_RUN == 'true' || steps.existing_release.outputs.count == '0'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure git author
        if: env.RELEASE_DRY_RUN == 'true' || steps.existing_release.outputs.count == '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        if: env.RELEASE_DRY_RUN == 'true' || steps.existing_release.outputs.count == '0'
        run: npm ci

      - name: Start test infrastructure
        if: env.RELEASE_DRY_RUN == 'true' || steps.existing_release.outputs.count == '0'
        run: |
          cd packages/test-infra
          docker compose up -d

      - name: Wait for services to be ready
        if: env.RELEASE_DRY_RUN == 'true' || steps.existing_release.outputs.count == '0'
        run: |
          cd packages/test-infra
          echo "Waiting for services to be healthy..."
          timeout 60 bash -c 'until docker compose exec -T postgres pg_isready -U test -d test -h localhost; do echo "Waiting for PostgreSQL..."; sleep 5; done'
          timeout 60 bash -c 'until docker compose exec -T mysql mysqladmin ping -h localhost --silent; do echo "Waiting for MySQL..."; sleep 5; done'
          timeout 60 bash -c 'until docker compose exec -T redis redis-cli ping; do echo "Waiting for Redis..."; sleep 5; done'
          timeout 120 bash -c 'until docker compose exec -T localstack awslocal sqs list-queues > /dev/null 2>&1; do echo "Waiting for LocalStack..."; sleep 5; done'
          timeout 120 bash -c 'until docker compose exec -T minio mc ready local > /dev/null 2>&1; do echo "Waiting for MinIO..."; sleep 5; done'
          echo "All services are ready!"

      - name: Prepare release commit
        id: prepare
        if: env.RELEASE_DRY_RUN == 'true' || steps.existing_release.outputs.count == '0'
        run: |
          args=(prepare "$RELEASE_VERSION")
          if [[ -n "$RELEASE_PREID" ]]; then
            args+=("--preid" "$RELEASE_PREID")
          fi
          if [[ "$RELEASE_DRY_RUN" == "true" ]]; then
            args+=("--dry-run")
          fi
          if [[ "$RELEASE_SKIP_EMPTY" == "true" ]]; then
            args+=("--skip-empty")
          fi

          before_head=$(git rev-parse HEAD)
          npm run release -- "${args[@]}"
          after_head=$(git rev-parse HEAD)

          if [[ "$before_head" == "$after_head" ]]; then
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push release branch
        if: env.RELEASE_DRY_RUN != 'true' && steps.existing_release.outputs.count == '0' && steps.prepare.outputs.created == 'true'
        run: |
          git push --set-upstream origin HEAD

      - name: Open release PR
        if: env.RELEASE_DRY_RUN != 'true' && steps.existing_release.outputs.count == '0' && steps.prepare.outputs.created == 'true'
        env:
          RELEASE_BRANCH: ${{ env.RELEASE_BRANCH }}
        run: |
          title="chore(release): ${RELEASE_VERSION} release"
          if [[ -n "$RELEASE_PREID" ]]; then
            title="chore(release): ${RELEASE_VERSION} ${RELEASE_PREID} release"
          fi

          cat > /tmp/release-pr-body.md <<'BODY'
          ## Summary
          - automatically prepares the release version bump after changes land on `main`
          - publishing is intentionally separate and runs only after this PR merges to `main`

          ## Zero-trust release flow
          - this PR does not publish to npm
          - the publish job has no write permission to `main`
          - npm publishing uses trusted publishing via GitHub Actions OIDC, not an npm token
          - release tags are pushed by a separate post-publish job with no npm/OIDC permission
          BODY

          pr_url=$(gh pr create \
            --base main \
            --head "$RELEASE_BRANCH" \
            --title "$title" \
            --body-file /tmp/release-pr-body.md)

          gh pr merge "$pr_url" --auto --merge

          # PRs created by GITHUB_TOKEN do not naturally trigger pull_request workflows.
          # Dispatch Test explicitly against the release branch so the required `test`
          # check is attached to the PR head SHA and auto-merge can proceed.
          gh workflow run test.yml --ref "$RELEASE_BRANCH"

      - name: Cleanup test infrastructure
        if: always() && (env.RELEASE_DRY_RUN == 'true' || steps.existing_release.outputs.count == '0')
        run: |
          cd packages/test-infra
          docker compose down -v
